<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dummy Webpage</title>

    <style>
        /* Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
        }

        header {
            padding: 20px;
            text-align: center;
            background: rgba(0, 0, 0, 0.3);
        }

        nav {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 10px;
        }

        nav a {
            color: white;
            text-decoration: none;
            padding: 8px 15px;
            border-radius: 5px;
            transition: 0.3s;
        }

        nav a:hover {
            background: rgba(255,255,255,0.2);
        }

        .container {
            padding: 40px;
            text-align: center;
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            margin: 20px auto;
            width: 300px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
        }

        footer {
            text-align: center;
            padding: 15px;
            position: fixed;
            bottom: 0;
            width: 100%;
            background: rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

<header>
    <h1>My Dummy Webpage</h1>
    <nav>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Services</a>
        <a href="#">Contact</a>
    </nav>
</header>

<div class="container">
    <h2>Welcome 👋</h2>
    <p>This is a simple dummy webpage you can use as a starter template.</p>

    <div class="card">
        <h3>Card 1</h3>
        <p>Some example content goes here.</p>
    </div>

    <div class="card">
        <h3>Card 2</h3>
        <p>More placeholder content.</p>
    </div>

    <div class="card">
        <h3>Card 3</h3>
        <p>You can customize this however you want.</p>
    </div>
</div>

<footer>
    <p>© 2026 Dummy Website</p>
</footer>

</body>
</html>
