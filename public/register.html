<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Sign Up</title>
    <link rel="stylesheet" type="text/css" href="styles/main.css"/>
    <link rel="stylesheet" type="text/css" href="styles/reset.css"/>
    <link rel="stylesheet" href="register.css"/>
</head>
<body>
    <header>
        <h1 class="main-heading">- Register -</h1>
    </header>

     <div class="page">
        <!-- Background visual effects -->
        <div class="bg-grid"></div> <!-- Grid overlay -->
        <div class="bg-scan"></div> <!-- Scanline animation -->
        <div class="glow glow-1"></div> <!-- Glow effect -->
        <div class="glow glow-2"></div>

        <main class="login-shell">
            <!-- Decorative border around login panel -->
            <div class="shell-border"></div>

            <section class="login-panel">
                <!-- More visual effects -->
                <div class="panel-scan"></div>
                <div class="panel-line top"></div>
                <div class="panel-line left"></div>
                <div class="panel-line right"></div>

                <div class="panel-content">
                    <!-- Header section -->
                    <div class="login-header">
                        <div class="header-text">
                            <!-- Title text -->
                            <p class="system-label">System Access</p>
                            <h1>~ Sign up ~</h1>
                            <p class="subtitle">Secure authentication required</p>
                        </div>

                        <!-- Animated orb -->
                        <div class="header-orb">
                            <div class="orb-core"></div>
                        </div>
                    </div>

                    <!-- Status indicator -->
                    <div class="status-box">
                        <span>Identity Verification</span>
                        <span class="online">Online</span>
                    </div>

                    <!-- LOGIN / REGISTER FORM -->
                    <form id="registerForm" class="login-form">
                        
                        <!-- Username input -->
                        <div class="input-group">
                            <label for="usernameInput">Username</label>
                            <input
                                type="text"
                                id="usernameInput"
                                name="username"
                                placeholder="Enter your username"
                                autocomplete="username"
                                required
                            />
                        </div>

                        <!-- Password input -->
                        <div class="input-group">
                            <label for="passwordInput">Password</label>
                            <div class="password-wrap">
                                <input
                                    type="password"
                                    id="passwordInput"
                                    name="password"
                                    placeholder="Enter your password"
                                    autocomplete="current-password"
                                    required
                                />

                                <!-- Button to toggle password visibility -->
                                <button type="button" class="view-btn" aria-label="View password">
                                    View
                                </button>
                            </div>
                        </div>

                        <!-- Remember me + recovery -->
                        <div class="login-options">
                            <label class="remember">
                                <input type="checkbox" name="remember" />
                                <span>Remember me</span>
                            </label>

                            <a href="#" class="recovery-link">Recovery</a>
                        </div>

                        <!-- Submit button -->
                        <button type="submit" id="loginBtn" class="signin-btn">
                            Initialize Sign up
                        </button>

                        <!-- Link to login page -->
                        <p class="register-copy">
                            Already have an account?
                            <a href="login.html">Login</a>
                        </p>

                        <!-- Terminal-style typing display -->
                        <div class="terminal-box">
                            <span id="terminalText"></span>
                            <span class="cursor" id="terminalCursor"></span>
                        </div>

                        <!-- Footer info -->
                        <div class="panel-footer">
                            <span>Threat Shield Active</span>
                            <span>v8.7</span>
                        </div>
                    </form>
                </div>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
